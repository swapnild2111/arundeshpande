      hi: "International Carrom Federation द्वारा प्रकाशित कैरम के संपूर्ण नियम — उपकरण, परिभाषाएँ, मैच प्रक्रिया, स्कोरिंग, फ़ाउल और Queen नियम।"
      gu: "International Carrom Federation દ્વારા પ્રકાશિત કેરમના સંપૂર્ણ કાયદા — સાધનો, વ્યાખ્યાઓ, મેચ પ્રક્રિયા, સ્કોરિંગ, ફાઉલ અને Queen નિયમો."
      pl: "Kompletne przepisy Carrom opublikowane przez Międzynarodową Federację Carrom — sprzęt, definicje, procedura meczowa, punktacja, faule i zasady dotyczące Queen."
      mni: "International Carrom Federation না ꯐꯦꯡꯗꯣꯛꯄ ꯀꯦꯔꯝꯒꯤ ꯆꯥꯡꯁꯤꯟ — ꯇ꯭ꯔꯩꯅꯤꯡ, ꯃꯅꯨꯡꯕꯗꯥ ꯁꯤꯡꯕ, ꯃꯆꯡ ꯍꯥꯏꯕ ꯑꯃꯁꯨꯡ Queen ꯆꯥꯡꯁꯤꯟ."
      ta: "சர்வதேச கேரம் கூட்டமைப்பால் வெளியிடப்பட்ட கேரம் முழு விதிகள் — உபகரணங்கள், வரையறைகள், போட்டி நடைமுறை, மதிப்பெண், தவறுகள் மற்றும் Queen விதிகள்."
