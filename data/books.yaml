      de: "Die offiziellen internationalen Carrom-Regeln der International Carrom Federation."
      mr: "International Carrom Federation द्वारे प्रकाशित कॅरमचे संपूर्ण नियम — उपकरण, व्याख्या, सामना प्रक्रिया, गुण, फाऊल आणि Queen नियम."
