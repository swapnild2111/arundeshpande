      hi: "अरुण देशपांडे की संपूर्ण कोचिंग पुस्तक — ग्रिप, ब्रेक, सभी प्रमुख स्ट्रोक, रक्षा, आक्रमण और उन्नत बोर्ड स्थितियाँ।"
      gu: "અરુણ દેશપાંડેની સંપૂર્ણ કોચિંગ બુક — ગ્રિપ્સ, બ્રેક્સ, દરેક મુખ્ય સ્ટ્રોક, ડિફેન્સ, ઓફેન્સ અને એડવાન્સ્ડ બોર્ડ પોઝિશન્સ."
      pl: "Kompletna książka coachingowa Aruna Deshpande — chwyty, przebicia, wszystkie główne uderzenia, obrona, atak i zaawansowane pozycje na planszy."
      mni: "ꯑꯔꯨꯟ ꯗꯦꯁꯄꯥꯟꯗꯦꯒꯤ ꯑꯣꯏꯕ ꯀꯣꯆꯤꯡ ꯄꯨꯛ — ꯒ꯭ꯔꯤꯄ, ꯕ꯭ꯔꯦꯛ, ꯃꯇꯝ ꯑꯃꯁꯨꯡ ꯑꯗꯨꯒꯨꯝꯕꯒꯤ ꯄꯣꯖꯤꯁꯟ."
      ta: "அருண் தேஷ்பாண்டேயின் முழுமையான பயிற்சி புத்தகம் — கைப்பிடிகள், இடைவேளைகள், எல்லா முக்கிய அடிகள், தற்காப்பு மற்றும் மேம்பட்ட நிலைகள்."
