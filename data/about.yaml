en: |
  Born and raised in **Thane, Maharashtra**, Arun Deshpande began his carrom journey in the late 1950s, rising to become one of the most decorated players in Indian carrom history.

  He won his **Men's National Singles Championship in 1969** representing Maharashtra, and later the Mixed Doubles at the 1972 Senior Nationals. In 1981, he also chaired the National Veteran title — proving his mastery across decades.

  As coach of the Indian national team, Arun led India to **dominate both the 1st and 2nd World Carrom Championships** — winning every available medal. He also guided India to the 2006 Carrom World Cup.

  His international coaching footprint spans **Sri Lanka, Maldives, France, Germany, Switzerland, UK, Canada** and more. Modern Pierre Dubois of France won his European Championship under his guidance. He is a life member of the **Indian Carrom Federation**.

da: |
  Født og opvokset i **Thane, Maharashtra**, begyndte Arun Deshpandes carrom-rejse i slutningen af 1950'erne, og han voksede til en af de mest dekorerede spillere i indisk carrom-historie.

  Han vandt **det indiske herresingle-mesterskab i 1969** for Maharashtra og senere mixed-double ved Senior Nationals i 1972. I 1981 vandt han også veteran-titlen — et bevis på hans klasse over flere årtier.

  Som træner for det indiske landshold førte Arun Indien til **dominans ved både det 1. og 2. verdensmesterskab i carrom** — Indien vandt alle tilgængelige medaljer. Han stod også på sidelinjen ved Carrom World Cup i 2006.

  Hans internationale træningsspor strækker sig over **Sri Lanka, Maldiverne, Frankrig, Tyskland, Schweiz, Storbritannien, Canada** og flere lande. Han er livsvarigt medlem af **Indian Carrom Federation**.

de: |
  Geboren und aufgewachsen in **Thane, Maharashtra**, begann Arun Deshpandes Carrom-Laufbahn in den späten 1950er-Jahren. Er entwickelte sich zu einem der erfolgreichsten Spieler in der Geschichte des indischen Carrom.

  Er gewann **1969 die nationalen Herren-Einzelmeisterschaft** für Maharashtra und 1972 das Mixed-Doppel der Senior National. 1981 sicherte er sich zudem den Veteranen-Titel — ein Beleg für seine Klasse über mehrere Jahrzehnte hinweg.

  Als Trainer der indischen Nationalmannschaft führte Arun Indien bei den **ersten beiden Carrom-Weltmeisterschaften zur klaren Dominanz** — Indien gewann jede verfügbare Medaille. Auch beim Carrom World Cup 2006 stand er an der Seitenlinie.

  Sein internationales Trainerleben umspannt **Sri Lanka, Malediven, Frankreich, Deutschland, Schweiz, Großbritannien, Kanada** und weitere Länder. Pierre Dubois aus Frankreich gewann unter seiner Anleitung die Europameisterschaft. Er ist lebenslanges Mitglied der **Indian Carrom Federation**.
