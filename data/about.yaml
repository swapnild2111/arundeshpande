en: 'Born and raised in **Thane, Maharashtra**, Arun Deshpande began his carrom journey
  in the late 1950s, rising to become one of the most decorated players in Indian
  carrom history.


  He won his **Men''s National Singles Championship in 1969** representing Maharashtra,
  and later the Mixed Doubles at the 1972 Senior Nationals. In 1981, he also chaired
  the National Veteran title — proving his mastery across decades.


  As coach of the Indian national team, Arun led India to **dominate both the 1st
  and 2nd World Carrom Championships** — winning every available medal. He also guided
  India to the 2006 Carrom World Cup.


  His international coaching footprint spans **Sri Lanka, Maldives, France, Germany,
  Switzerland, UK, Canada** and more. Modern Pierre Dubois of France won his European
  Championship under his guidance. He is a life member of the **Indian Carrom Federation**.

  '
da: 'Født og opvokset i **Thane, Maharashtra**, begyndte Arun Deshpandes carrom-rejse
  i slutningen af 1950''erne, og han voksede til en af de mest dekorerede spillere
  i indisk carrom-historie.


  Han vandt **det indiske herresingle-mesterskab i 1969** for Maharashtra og senere
  mixed-double ved Senior Nationals i 1972. I 1981 vandt han også veteran-titlen —
  et bevis på hans klasse over flere årtier.


  Som træner for det indiske landshold førte Arun Indien til **dominans ved både det
  1. og 2. verdensmesterskab i carrom** — Indien vandt alle tilgængelige medaljer.
  Han stod også på sidelinjen ved Carrom World Cup i 2006.


  Hans internationale træningsspor strækker sig over **Sri Lanka, Maldiverne, Frankrig,
  Tyskland, Schweiz, Storbritannien, Canada** og flere lande. Han er livsvarigt medlem
  af **Indian Carrom Federation**.

  '
de: 'Geboren und aufgewachsen in **Thane, Maharashtra**, begann Arun Deshpandes Carrom-Laufbahn
  in den späten 1950er-Jahren. Er entwickelte sich zu einem der erfolgreichsten Spieler
  in der Geschichte des indischen Carrom.


  Er gewann **1969 die nationalen Herren-Einzelmeisterschaft** für Maharashtra und
  1972 das Mixed-Doppel der Senior National. 1981 sicherte er sich zudem den Veteranen-Titel
  — ein Beleg für seine Klasse über mehrere Jahrzehnte hinweg.


  Als Trainer der indischen Nationalmannschaft führte Arun Indien bei den **ersten
  beiden Carrom-Weltmeisterschaften zur klaren Dominanz** — Indien gewann jede verfügbare
  Medaille. Auch beim Carrom World Cup 2006 stand er an der Seitenlinie.


  Sein internationales Trainerleben umspannt **Sri Lanka, Malediven, Frankreich, Deutschland,
  Schweiz, Großbritannien, Kanada** und weitere Länder. Pierre Dubois aus Frankreich
  gewann unter seiner Anleitung die Europameisterschaft. Er ist lebenslanges Mitglied
  der **Indian Carrom Federation**.

  '
mr: '**ठाणे, महाराष्ट्र** येथे जन्मलेल्या आणि वाढलेल्या, श्री अरुण देशपांडे यांनी त्यांचा
  carrom प्रवास 1950 च्या उत्तरार्धात सुरू केला, ते भारतीय carrom इतिहासातील सर्वात
  सुशोभित खेळाडूंपैकी एक बनले.


  त्याने **1969 मध्ये **पुरुषांची राष्ट्रीय एकेरी चॅम्पियनशिप* महाराष्ट्राचे प्रतिनिधित्व
  करून जिंकली आणि नंतर 1972 च्या वरिष्ठ नागरिकांमध्ये मिश्र दुहेरी स्पर्धा जिंकली.
  1981 मध्ये, त्यांनी राष्ट्रीय दिग्गज पदवीचे अध्यक्षपदही भूषवले - अनेक दशकांपासून
  त्यांचे प्रभुत्व सिद्ध केले.


  भारतीय राष्ट्रीय संघाचे प्रशिक्षक या नात्याने, अरुण यांनी भारताला **पहिली आणि दुसरी
  जागतिक Carrom चॅम्पियनशिप** वर वर्चस्व मिळवून दिले - प्रत्येक उपलब्ध पदक जिंकून.
  2006 च्या Carrom विश्वचषक स्पर्धेतही त्यांनी भारताला मार्गदर्शन केले.


  **श्रीलंका, मालदीव, फ्रान्स, जर्मनी, स्वित्झर्लंड, यूके, कॅनडा** आणि बरेच काही येथे
  त्यांचे आंतरराष्ट्रीय कोचिंग फूटप्रिंट पसरलेले आहे. फ्रान्सच्या मॉडर्न पियरे डुबॉइसने
  त्यांच्या मार्गदर्शनाखाली युरोपियन चॅम्पियनशिप जिंकली. ते **भारतीय Carrom फेडरेशन**
  चे आजीवन सदस्य आहेत.'
it: 'Nato e cresciuto a **Thane, Maharashtra**, Arun Deshpande ha iniziato il suo
  viaggio con carrom alla fine degli anni ''50, diventando uno dei giocatori più decorati
  nella storia indiana di carrom.


  Ha vinto il suo **Campionato nazionale di singolare maschile nel 1969** in rappresentanza
  del Maharashtra, e successivamente il Doppio misto ai Nazionali senior del 1972.
  Nel 1981, ha anche presieduto il titolo nazionale di veterano, dimostrando la sua
  maestria nel corso di decenni.


  Come allenatore della squadra nazionale indiana, Arun ha portato l''India a **dominare
  sia il 1° che il 2° campionato mondiale Carrom**, vincendo tutte le medaglie disponibili.
  Ha anche guidato l''India alla Coppa del Mondo Carrom del 2006.


  La sua presenza internazionale come coach abbraccia **Sri Lanka, Maldive, Francia,
  Germania, Svizzera, Regno Unito, Canada** e altro ancora. Il moderno Pierre Dubois
  della Francia ha vinto il suo campionato europeo sotto la sua guida. È membro a
  vita della **Federazione indiana Carrom**.'
fr: 'Né et élevé à **Thane, Maharashtra**, Arun Deshpande a commencé son parcours
  carrom à la fin des années 1950, devenant l''un des joueurs les plus décorés de
  l''histoire indienne de carrom.


  Il a remporté son **Championnat national masculin en simple en 1969** représentant
  le Maharashtra, et plus tard le double mixte aux Championnats nationaux seniors
  de 1972. En 1981, il a également présidé le titre national de vétéran, prouvant
  sa maîtrise au fil des décennies.


  En tant qu''entraîneur de l''équipe nationale indienne, Arun a conduit l''Inde à
  **dominer les 1er et 2e Championnats du monde Carrom** — remportant toutes les médailles
  disponibles. Il a également guidé l''Inde vers la Coupe du monde Carrom 2006.


  Son empreinte internationale en tant que coach s''étend au **Sri Lanka, aux Maldives,
  à la France, à l''Allemagne, à la Suisse, au Royaume-Uni, au Canada** et plus encore.
  Le Français moderne Pierre Dubois a remporté son Championnat d''Europe sous sa direction.
  Il est membre à vie de la **Fédération indienne Carrom**.'
si: '**තානේ, මහාරාෂ්ට්‍ර** හි ඉපදී හැදී වැඩුණු, ශ්‍රී අරුන් දේශ්පාන්ඩේ මහතා 1950 ගණන්වල අගභාගයේදී
  තම carrom ගමන ආරම්භ කළ අතර, ඉන්දීය carrom ඉතිහාසයේ වඩාත්ම සරසන ලද ක්‍රීඩකයෙකු
  බවට පත් වූහ.


  ඔවුන් 1969 දී මහාරාෂ්ට්‍ර නියෝජනය කරමින් **පිරිමි ජාතික කේවල ශූරතාව** දිනාගත්
  අතර පසුව 1972 ජ්‍යෙෂ්ඨ ජාතික තරඟාවලියේ මිශ්‍ර යුගලය. 1981 දී, ඔවුන් ජාතික ප්‍රවීණ
  පදවියේ ද මුලසුන දැරූහ - දශක ගණනාවක් පුරා ඔවුන්ගේ ප්‍රවීණත්වය ඔප්පු කළේය.


  ඉන්දීය ජාතික කණ්ඩායමේ පුහුණුකරු ලෙස, අරුන් සර් ඉන්දියාවට නායකත්වය ලබා දුන්නේ **පළමුවන
  සහ 2වන ලෝක Carrom ශූරතා දෙකෙහිම ආධිපත්‍යය දැරීමයි** — පවතින සෑම පදක්කමක්ම දිනා ගනිමින්.
  ඔවුන් 2006 Carrom ලෝක කුසලානයට ඉන්දියාවට මඟ පෙන්වූහ.


  ඔවුන්ගේ ජාත්‍යන්තර පුහුණු පියසටහන **ශ්‍රී ලංකාව, මාලදිවයින, ප්‍රංශය, ජර්මනිය, ස්විට්සර්ලන්තය,
  එක්සත් රාජධානිය, කැනඩාව** සහ තවත් බොහෝ රටවලට විහිදේ. ප්‍රංශයේ නූතන පියරේ ඩුබොයිස්
  ඔවුන්ගේ මග පෙන්වීම යටතේ යුරෝපීය ශූරතාව දිනා ගත්තේය. ඔවුන් **ඉන්දියානු Carrom සම්මේලනයේ**
  යාවජීව සාමාජිකයෙකි.'
hi: '**ठाणे, महाराष्ट्र** में जन्मे और पले-बढ़े, श्री अरुण देशपांडे जी ने 1950 के दशक के
  अंत में अपनी carrom यात्रा शुरू की, और भारतीय carrom इतिहास में सबसे प्रतिष्ठित
  खिलाड़ियों में से एक बन गए।


  उन्होंने 1969 में महाराष्ट्र का प्रतिनिधित्व करते हुए अपनी **पुरुष राष्ट्रीय एकल
  चैम्पियनशिप** जीती, और बाद में 1972 के सीनियर नेशनल में मिश्रित युगल जीता। 1981
  में, उन्होंने दशकों तक अपनी महारत साबित करते हुए नेशनल वेटरन खिताब की भी अध्यक्षता
  की।


  भारतीय राष्ट्रीय टीम के कोच के रूप में, अरुण ने भारत को **पहली और दूसरी विश्व Carrom
  चैंपियनशिप** में दबदबा बनाने के लिए प्रेरित किया - हर उपलब्ध पदक जीता। उन्होंने
  2006 Carrom विश्व कप में भी भारत का मार्गदर्शन किया।


  उनका अंतर्राष्ट्रीय कोचिंग पदचिह्न **श्रीलंका, मालदीव, फ्रांस, जर्मनी, स्विट्जरलैंड,
  ब्रिटेन, कनाडा** और भी बहुत कुछ तक फैला हुआ है। उनके मार्गदर्शन में फ्रांस के मॉडर्न
  पियरे डुबोइस ने यूरोपीय चैम्पियनशिप जीती। वह **इंडियन Carrom फेडरेशन** के आजीवन
  सदस्य हैं।'
gu: '**થાણે, મહારાષ્ટ્ર**માં જન્મેલા અને ઉછરેલા, શ્રી અરુણ દેશપાંડે સાહેબે 1950 ના દાયકાના અંતમાં
  તેમની carrom સફર શરૂ કરી, ભારતીય carrom ઈતિહાસના સૌથી વધુ સુશોભિત ખેલાડીઓમાંના
  એક બન્યા.


  તેમણે 1969માં **મેન્સ નેશનલ સિંગલ્સ ચેમ્પિયનશીપ** જીતી. 1981માં, તેમણે નેશનલ વેટરન
  ટાઇટલની અધ્યક્ષતા પણ સંભાળી - દાયકાઓ સુધી તેમની નિપુણતા સાબિત કરી.


  ભારતીય રાષ્ટ્રીય ટીમના કોચ તરીકે, અરુણ સાહેબે ભારતને **1લી અને 2જી વિશ્વ Carrom બંને ચેમ્પિયનશીપમાં
  વર્ચસ્વ જમાવ્યું** — દરેક ઉપલબ્ધ મેડલ જીતીને. તેમણે 2006 Carrom વર્લ્ડ કપમાં પણ ભારતને
  માર્ગદર્શન આપ્યું.


  તેમની આંતરરાષ્ટ્રીય કોચિંગ ફૂટપ્રિન્ટ **શ્રીલંકા, માલદીવ્સ, ફ્રાન્સ, જર્મની, સ્વિટ્ઝર્લેન્ડ,
  યુકે, કેનેડા** અને વધુ ફેલાયેલી છે. ફ્રાન્સના આધુનિક પિયર ડુબોઈસે તેમના માર્ગદર્શન
  હેઠળ યુરોપિયન ચેમ્પિયનશિપ જીતી. તેઓ **ભારતીય Carrom ફેડરેશન**ના આજીવન સભ્ય છે.'
pl: 'Urodzony i wychowany w **Thane w stanie Maharasztra**, Arun Deshpande rozpoczął
  swoją carrom podróż pod koniec lat pięćdziesiątych, stając się jednym z najbardziej
  utytułowanych graczy w carrom historii Indii.


  Wygrał swoje **Krajowe Mistrzostwa Mężczyzn w grze pojedynczej w 1969**, reprezentując
  Maharasztrę, a później w grze podwójnej mieszanej na Mistrzostwach Seniorów w 1972
  roku. W 1981 r. przewodniczył także narodowemu tytułowi weterana, co udowodniło
  jego mistrzostwo przez dziesięciolecia.


  Jako trener reprezentacji Indii Arun poprowadził Indie do **zdominowania zarówno
  w 1., jak i 2. Carrom Mistrzostwach Świata** – zdobywając wszystkie dostępne medale.
  Poprowadził także Indie na Mistrzostwa Świata Carrom 2006.


  Jego międzynarodowy zasięg coachingowy obejmuje **Sri Lankę, Malediwy, Francję,
  Niemcy, Szwajcarię, Wielką Brytanię, Kanadę** i nie tylko. Współczesny Pierre Dubois
  z Francji pod jego okiem zdobył mistrzostwo Europy. Jest dożywotnim członkiem **Indyjskiej
  CarromFederacji**.'
mni: '**ꯊꯥꯅꯦ, ꯃꯍꯥꯔꯥꯁ꯭ꯠꯔ**ꯗꯥ ꯄꯣꯀꯈꯤꯕꯥ ꯑꯃꯁꯨꯡ ꯍꯤꯡꯈꯤꯕꯥ Arun Deshpande ꯃꯍꯥꯛꯀꯤ carrom ꯈꯣꯉꯆꯠ
  ꯑꯁꯤ ꯱꯹꯵꯰ꯒꯤ ꯃꯌꯥꯏ ꯆꯜꯂꯀꯄꯗꯥ ꯍꯧꯈꯤ, ꯚꯥꯔꯇꯀꯤ carrom ꯄꯨꯋꯥꯔꯤꯗꯥ ꯈ꯭ꯕꯥꯏꯗꯒꯤ ꯃꯁꯛ ꯊꯣꯀꯄꯥ ꯄ꯭ꯂꯦꯌꯥꯔ
  ꯑꯃꯥ ꯑꯣꯏꯅꯥ ꯍꯦꯅꯒꯠꯂꯀꯈꯤ꯫


  ꯃꯍꯥꯛꯅꯥ ꯃꯍꯥꯛꯀꯤ **꯱꯹꯶꯹**ꯗꯥ ꯃꯍꯥꯔꯥꯁ꯭ꯠꯔꯒꯤ ꯃꯍꯨꯠ ꯁꯤꯟꯗꯨꯅꯥ ꯃꯍꯥꯛꯀꯤ **ꯃꯦꯅꯁ ꯅꯦꯁ꯭ꯅꯦꯜ ꯁꯤꯉ꯭ꯒꯂꯁ
  ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ ꯂꯧꯈꯤ, ꯑꯃꯁꯨꯡ ꯃꯇꯨꯡꯗꯥ ꯱꯹꯷꯲ꯒꯤ ꯁꯦꯅꯤꯌꯔ ꯅꯦꯁ꯭ꯅꯦꯂꯁꯤꯡꯗꯥ ꯃꯤꯛꯁ ꯗꯕꯂꯁ ꯂꯧꯈꯤ꯫ ꯱꯹꯸꯱ꯗꯥ
  ꯃꯍꯥꯛꯅꯥ ꯅꯦꯁ꯭ꯅꯦꯜ ꯚꯦꯇꯔꯥꯟ ꯇꯥꯏꯇꯂꯁꯨ ꯆꯦꯌꯔꯃꯦꯟ ꯑꯣꯏꯈꯤ — ꯆꯍꯤ ꯇꯔꯥꯒꯤ ꯈꯨꯖꯤꯡ ꯀꯌꯥꯒꯤ ꯃꯅꯨꯡꯗꯥ ꯃꯍꯥꯛꯀꯤ
  ꯃꯥꯁ꯭ꯇꯔꯤ ꯑꯗꯨ ꯄ꯭ꯔꯃꯥꯟ ꯇꯧꯈꯤ꯫


  ꯚꯥꯔꯇꯀꯤ ꯅꯦꯁ꯭ꯅꯦꯜ ꯇꯤꯃꯒꯤ ꯀꯣꯆ ꯑꯣꯏꯅꯥ ꯑꯔꯨꯅꯅꯥ ꯚꯥꯔꯇꯄꯨ ꯂꯨꯆꯤꯡꯗꯨꯅꯥ **꯱ꯁꯨꯕꯥ ꯑꯃꯁꯨꯡ ꯲ꯁꯨꯕꯥ ꯋꯥꯔꯜꯗ
  Carrom ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ ꯑꯅꯤꯃꯛꯇꯥ ꯗꯣꯃꯤꯅꯦꯠ ꯇꯧꯈꯤ** — ꯐꯪꯂꯤꯕꯥ ꯃꯦꯗꯜ ꯈꯨꯗꯤꯡꯃꯛ ꯂꯧꯈꯤ꯫ ꯃꯍꯥꯛꯅꯥ ꯲꯰꯰꯶ꯀꯤ
  Carrom ꯋꯥꯔꯜꯗ ꯀꯄꯇꯥ ꯚꯥꯔꯇꯄꯨ ꯂꯃꯖꯤꯡꯕꯤꯈꯤ꯫


  ꯃꯍꯥꯛꯀꯤ ꯏꯟꯇꯔꯅꯦꯁ꯭ꯅꯦꯜ ꯀꯣꯆꯤꯡꯒꯤ ꯈꯣꯡꯆꯠ ꯑꯁꯤ **ꯁ꯭ꯔꯤꯂꯉ꯭ꯀꯥ, ꯃꯥꯂꯗꯤꯕꯁ, ꯐ꯭ꯔꯥꯟꯁ, ꯖꯔꯃꯅꯤ, ꯁ꯭ꯕꯤꯠꯖꯔꯂꯦꯟꯗ,
  ꯌꯨ.ꯀꯦ., ꯀꯅꯥꯗꯥ** ꯑꯃꯁꯨꯡ ꯑꯇꯩ ꯀꯌꯥꯗꯥ ꯌꯥꯑꯣꯔꯤ꯫ ꯐ꯭ꯔꯥꯟꯁꯀꯤ ꯃꯣꯗꯔꯟ ꯄꯤꯌꯔ ꯗꯨꯕꯣꯏꯁꯅꯥ ꯃꯍꯥꯛꯀꯤ ꯂꯃꯖꯤꯡ
  ꯃꯈꯥꯗꯥ ꯌꯨꯔꯣꯄꯤꯌꯟ ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ ꯂꯧꯈꯤ꯫ ꯃꯍꯥꯛ **ꯚꯥꯔꯇꯀꯤ Carrom ꯐꯦꯗꯔꯦꯁꯟ**ꯒꯤ ꯄꯨꯟꯁꯤꯒꯤ ꯃꯦꯝꯕꯔ ꯑꯃꯅꯤ꯫'
ta: '**தானே, மகாராஷ்டிராவில்** பிறந்து வளர்ந்த Arun Deshpande, 1950களின் பிற்பகுதியில்
  தனது carrom பயணத்தைத் தொடங்கி, இந்திய carrom வரலாற்றில் மிகவும் அலங்கரிக்கப்பட்ட
  வீரர்களில் ஒருவராக உயர்ந்தார்.


  அவர் 1969 ஆம் ஆண்டு மகாராஷ்டிராவைப் பிரதிநிதித்துவப்படுத்தி **ஆண்கள் தேசிய ஒற்றையர்
  சாம்பியன்ஷிப்பை வென்றார், பின்னர் 1972 சீனியர் நேஷனல்ஸில் கலப்பு இரட்டையர். 1981
  இல், அவர் தேசிய மூத்த பட்டத்திற்கும் தலைமை தாங்கினார் - பல தசாப்தங்களாக தனது தேர்ச்சியை
  நிரூபித்தார்.


  இந்திய தேசிய அணியின் பயிற்சியாளராக, அருண் இந்தியாவை **1வது மற்றும் 2வது உலக Carrom
  சாம்பியன்ஷிப் இரண்டிலும் ஆதிக்கம் செலுத்துவதற்கு** - கிடைக்கக்கூடிய ஒவ்வொரு பதக்கத்தையும்
  வென்றார். 2006 Carrom உலகக் கோப்பைக்கும் இந்தியாவை வழிநடத்தினார்.


  **இலங்கை, மாலத்தீவு, பிரான்ஸ், ஜெர்மனி, சுவிட்சர்லாந்து, யுகே, கனடா** மற்றும் பலவற்றில்
  அவரது சர்வதேச பயிற்சி தடம் பரவியுள்ளது. பிரான்சின் நவீன பியர் டுபோயிஸ் அவரது வழிகாட்டுதலின்
  கீழ் தனது ஐரோப்பிய சாம்பியன்ஷிப்பை வென்றார். அவர் **இந்திய Carrom கூட்டமைப்பு**
  இன் வாழ்நாள் உறுப்பினர்.'
