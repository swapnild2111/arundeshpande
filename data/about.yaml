en: 'Born and raised in **Thane, Maharashtra**, Arun Deshpande began his carrom journey
  in the late 1950s, rising to become one of the most decorated players in Indian
  carrom history.

  He won his **Men''s National Singles Championship in 1969** representing Maharashtra,
  and later the Mixed Doubles at the 1972 Senior Nationals. In 1981, he also chaired
  the National Veteran title — proving his mastery across decades.

  As coach of the Indian national team, Arun led India to **dominate both the 1st
  and 2nd World Carrom Championships** — winning every available medal. He also guided
  India to the 2006 Carrom World Cup.

  His international coaching footprint spans **Sri Lanka, Maldives, France, Germany,
  Switzerland, UK, Canada** and more. Modern Pierre Dubois of France won his European
  Championship under his guidance. He is a life member of the **Indian Carrom Federation**.

  '
mr: '**ठाणे, महाराष्ट्र** येथे जन्मलेल्या आणि वाढलेल्या, श्री अरुण देशपांडे यांनी
  त्यांचा कॅरम प्रवास 1950 च्या उत्तरार्धात सुरू केला, ते भारतीय कॅरम इतिहासातील सर्वात
  सुशोभित खेळाडूंपैकी एक बनले.

  त्याने 1969 मध्ये **पुरुषांची राष्ट्रीय एकेरी चॅम्पियनशिप** महाराष्ट्राचे प्रतिनिधित्व
  करून जिंकली आणि नंतर 1972 च्या वरिष्ठ नागरिकांमध्ये मिश्र दुहेरी स्पर्धा जिंकली.
  1981 मध्ये, त्यांनी राष्ट्रीय दिग्गज पदवीचे अध्यक्षपदही भूषवले - अनेक दशकांपासून
  त्यांचे प्रभुत्व सिद्ध केले.

  भारतीय राष्ट्रीय संघाचे प्रशिक्षक या नात्याने, अरुण यांनी भारताला **पहिली आणि दुसरी
  जागतिक कॅरम चॅम्पियनशिप** वर वर्चस्व मिळवून दिले - प्रत्येक उपलब्ध पदक जिंकून. 2006
  च्या कॅरम विश्वचषक स्पर्धेतही त्यांनी भारताला मार्गदर्शन केले.

  **श्रीलंका, मालदीव, फ्रान्स, जर्मनी, स्वित्झर्लंड, यूके, कॅनडा** आणि बरेच काही येथे
  त्यांचे आंतरराष्ट्रीय कोचिंग फूटप्रिंट पसरलेले आहे. फ्रान्सच्या मॉडर्न पियरे डुबॉइसने
  त्यांच्या मार्गदर्शनाखाली युरोपियन चॅम्पियनशिप जिंकली. ते **भारतीय कॅरम फेडरेशन**
  चे आजीवन सदस्य आहेत.'
si: '**තානේ, මහාරාෂ්ට්‍ර** හි ඉපදී හැදී වැඩුණු, ශ්‍රී අරුන් දේශ්පාන්ඩේ මහතා 1950 ගණන්වල
  අගභාගයේදී තම කැරම් ගමන ආරම්භ කළ අතර, ඉන්දීය කැරම් ඉතිහාසයේ වඩාත්ම සරසන ලද ක්‍රීඩකයෙකු
  බවට පත් වූහ.

  ඔවුන් 1969 දී මහාරාෂ්ට්‍ර නියෝජනය කරමින් **පිරිමි ජාතික කේවල ශූරතාව** දිනාගත් අතර
  පසුව 1972 ජ්‍යෙෂ්ඨ ජාතික තරඟාවලියේ මිශ්‍ර යුගලය. 1981 දී, ඔවුන් ජාතික ප්‍රවීණ පදවියේ
  ද මුලසුන දැරූහ - දශක ගණනාවක් පුරා ඔවුන්ගේ ප්‍රවීණත්වය ඔප්පු කළේය.

  ඉන්දීය ජාතික කණ්ඩායමේ පුහුණුකරු ලෙස, අරුන් සර් ඉන්දියාවට නායකත්වය ලබා දුන්නේ **පළමුවන
  සහ 2වන ලෝක කැරම් ශූරතා දෙකෙහිම ආධිපත්‍යය දැරීමයි** — පවතින සෑම පදක්කමක්ම දිනා ගනිමින්.
  ඔවුන් 2006 කැරම් ලෝක කුසලානයට ඉන්දියාවට මඟ පෙන්වූහ.

  ඔවුන්ගේ ජාත්‍යන්තර පුහුණු පියසටහන **ශ්‍රී ලංකාව, මාලදිවයින, ප්‍රංශය, ජර්මනිය, ස්විට්සර්ලන්තය,
  එක්සත් රාජධානිය, කැනඩාව** සහ තවත් බොහෝ රටවලට විහිදේ. ප්‍රංශයේ නූතන පියරේ ඩුබොයිස්
  ඔවුන්ගේ මග පෙන්වීම යටතේ යුරෝපීය ශූරතාව දිනා ගත්තේය. ඔවුන් **ඉන්දියානු කැරම් සම්මේලනයේ**
  යාවජීව සාමාජිකයෙකි.'
hi: '**ठाणे, महाराष्ट्र** में जन्मे और पले-बढ़े, श्री अरुण देशपांडे जी ने 1950 के
  दशक के अंत में अपनी कैरम यात्रा शुरू की, और भारतीय कैरम इतिहास में सबसे प्रतिष्ठित
  खिलाड़ियों में से एक बन गए।

  उन्होंने 1969 में महाराष्ट्र का प्रतिनिधित्व करते हुए अपनी **पुरुष राष्ट्रीय एकल
  चैम्पियनशिप** जीती, और बाद में 1972 के सीनियर नेशनल में मिश्रित युगल जीता। 1981
  में, उन्होंने दशकों तक अपनी महारत साबित करते हुए नेशनल वेटरन खिताब की भी अध्यक्षता
  की।

  भारतीय राष्ट्रीय टीम के कोच के रूप में, अरुण ने भारत को **पहली और दूसरी विश्व कैरम
  चैंपियनशिप** में दबदबा बनाने के लिए प्रेरित किया - हर उपलब्ध पदक जीता। उन्होंने
  2006 कैरम विश्व कप में भी भारत का मार्गदर्शन किया।

  उनका अंतर्राष्ट्रीय कोचिंग पदचिह्न **श्रीलंका, मालदीव, फ्रांस, जर्मनी, स्विट्जरलैंड,
  ब्रिटेन, कनाडा** और भी बहुत कुछ तक फैला हुआ है। उनके मार्गदर्शन में फ्रांस के मॉडर्न
  पियरे डुबोइस ने यूरोपीय चैम्पियनशिप जीती। वह **इंडियन कैरम फेडरेशन** के आजीवन सदस्य
  हैं।'
gu: '**થાણે, મહારાષ્ટ્ર**માં જન્મેલા અને ઉછરેલા, શ્રી અરુણ દેશપાંડે સાહેબે 1950 ના
  દાયકાના અંતમાં તેમની કેરમ સફર શરૂ કરી, ભારતીય કેરમ ઈતિહાસના સૌથી વધુ સુશોભિત ખેલાડીઓમાંના
  એક બન્યા.

  તેમણે 1969માં **મેન્સ નેશનલ સિંગલ્સ ચેમ્પિયનશીપ** જીતી. 1981માં, તેમણે નેશનલ વેટરન
  ટાઇટલની અધ્યક્ષતા પણ સંભાળી - દાયકાઓ સુધી તેમની નિપુણતા સાબિત કરી.

  ભારતીય રાષ્ટ્રીય ટીમના કોચ તરીકે, અરુણ સાહેબે ભારતને **1લી અને 2જી વિશ્વ કેરમ બંને
  ચેમ્પિયનશીપમાં વર્ચસ્વ જમાવ્યું** — દરેક ઉપલબ્ધ મેડલ જીતીને. તેમણે 2006 કેરમ વર્લ્ડ
  કપમાં પણ ભારતને માર્ગદર્શન આપ્યું.

  તેમની આંતરરાષ્ટ્રીય કોચિંગ ફૂટપ્રિન્ટ **શ્રીલંકા, માલદીવ્સ, ફ્રાન્સ, જર્મની, સ્વિટ્ઝર્લેન્ડ,
  યુકે, કેનેડા** અને વધુ ફેલાયેલી છે. ફ્રાન્સના આધુનિક પિયર ડુબોઈસે તેમના માર્ગદર્શન
  હેઠળ યુરોપિયન ચેમ્પિયનશિપ જીતી. તેઓ **ભારતીય કેરમ ફેડરેશન**ના આજીવન સભ્ય છે.'
mni: '**ꯊꯥꯅꯦ, ꯃꯍꯥꯔꯥꯁ꯭ꯠꯔ**ꯗꯥ ꯄꯣꯀꯈꯤꯕꯥ ꯑꯃꯁꯨꯡ ꯍꯤꯡꯈꯤꯕꯥ ꯑꯔꯨꯟ ꯗꯦꯁꯄꯥꯟꯗꯦ ꯃꯍꯥꯛꯀꯤ ꯀꯦꯔꯝ ꯈꯣꯉꯆꯠ
  ꯑꯁꯤ ꯱꯹꯵꯰ꯒꯤ ꯃꯌꯥꯏ ꯆꯜꯂꯀꯄꯗꯥ ꯍꯧꯈꯤ, ꯚꯥꯔꯇꯀꯤ ꯀꯦꯔꯝ ꯄꯨꯋꯥꯔꯤꯗꯥ ꯈ꯭ꯕꯥꯏꯗꯒꯤ ꯃꯁꯛ ꯊꯣꯀꯄꯥ ꯄ꯭ꯂꯦꯌꯥꯔ ꯑꯃꯥ
  ꯑꯣꯏꯅꯥ ꯍꯦꯅꯒꯠꯂꯀꯈꯤ꯫

  ꯃꯍꯥꯛꯅꯥ ꯱꯹꯶꯹ꯗꯥ ꯃꯍꯥꯔꯥꯁ꯭ꯠꯔꯒꯤ ꯃꯍꯨꯠ ꯁꯤꯟꯗꯨꯅꯥ ꯃꯍꯥꯛꯀꯤ **ꯃꯦꯅꯁ ꯅꯦꯁ꯭ꯅꯦꯜ ꯁꯤꯉ꯭ꯒꯂꯁ ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ**
  ꯂꯧꯈꯤ, ꯑꯃꯁꯨꯡ ꯃꯇꯨꯡꯗꯥ ꯱꯹꯷꯲ꯒꯤ ꯁꯦꯅꯤꯌꯔ ꯅꯦꯁ꯭ꯅꯦꯂꯁꯤꯡꯗꯥ ꯃꯤꯛꯁ ꯗꯕꯂꯁ ꯂꯧꯈꯤ꯫ ꯱꯹꯸꯱ꯗꯥ ꯃꯍꯥꯛꯅꯥ ꯅꯦꯁ꯭ꯅꯦꯜ
  ꯚꯦꯇꯔꯥꯟ ꯇꯥꯏꯇꯂꯁꯨ ꯆꯦꯌꯔꯃꯦꯟ ꯑꯣꯏꯈꯤ — ꯆꯍꯤ ꯇꯔꯥꯒꯤ ꯈꯨꯖꯤꯡ ꯀꯌꯥꯒꯤ ꯃꯅꯨꯡꯗꯥ ꯃꯍꯥꯛꯀꯤ ꯃꯥꯁ꯭ꯇꯔꯤ ꯑꯗꯨ ꯄ꯭ꯔꯃꯥꯟ
  ꯇꯧꯈꯤ꯫

  ꯚꯥꯔꯇꯀꯤ ꯅꯦꯁ꯭ꯅꯦꯜ ꯇꯤꯃꯒꯤ ꯀꯣꯆ ꯑꯣꯏꯅꯥ ꯑꯔꯨꯅꯅꯥ ꯚꯥꯔꯇꯄꯨ ꯂꯨꯆꯤꯡꯗꯨꯅꯥ **꯱ꯁꯨꯕꯥ ꯑꯃꯁꯨꯡ ꯲ꯁꯨꯕꯥ ꯋꯥꯔꯜꯗ
  ꯀꯦꯔꯝ ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ ꯑꯅꯤꯃꯛꯇꯥ ꯗꯣꯃꯤꯅꯦꯠ ꯇꯧꯈꯤ** — ꯐꯪꯂꯤꯕꯥ ꯃꯦꯗꯜ ꯈꯨꯗꯤꯡꯃꯛ ꯂꯧꯈꯤ꯫ ꯃꯍꯥꯛꯅꯥ ꯲꯰꯰꯶ꯀꯤ
  ꯀꯦꯔꯝ ꯋꯥꯔꯜꯗ ꯀꯄꯇꯥ ꯚꯥꯔꯇꯄꯨ ꯂꯃꯖꯤꯡꯕꯤꯈꯤ꯫

  ꯃꯍꯥꯛꯀꯤ ꯏꯟꯇꯔꯅꯦꯁ꯭ꯅꯦꯜ ꯀꯣꯆꯤꯡꯒꯤ ꯈꯣꯡꯆꯠ ꯑꯁꯤ **ꯁ꯭ꯔꯤꯂꯉ꯭ꯀꯥ, ꯃꯥꯂꯗꯤꯕꯁ, ꯐ꯭ꯔꯥꯟꯁ, ꯖꯔꯃꯅꯤ, ꯁ꯭ꯕꯤꯠꯖꯔꯂꯦꯟꯗ,
  ꯌꯨ.ꯀꯦ., ꯀꯅꯥꯗꯥ** ꯑꯃꯁꯨꯡ ꯑꯇꯩ ꯀꯌꯥꯗꯥ ꯌꯥꯑꯣꯔꯤ꯫ ꯐ꯭ꯔꯥꯟꯁꯀꯤ ꯃꯣꯗꯔꯟ ꯄꯤꯌꯔ ꯗꯨꯕꯣꯏꯁꯅꯥ ꯃꯍꯥꯛꯀꯤ ꯂꯃꯖꯤꯡ
  ꯃꯈꯥꯗꯥ ꯌꯨꯔꯣꯄꯤꯌꯟ ꯆꯦꯝꯄꯤꯌꯅꯁꯤꯞ ꯂꯧꯈꯤ꯫ ꯃꯍꯥꯛ **ꯚꯥꯔꯇꯀꯤ ꯀꯦꯔꯝ ꯐꯦꯗꯔꯦꯁꯟ**ꯒꯤ ꯄꯨꯟꯁꯤꯒꯤ ꯃꯦꯝꯕꯔ ꯑꯃꯅꯤ꯫'
ta: '**தானே, மகாராஷ்டிராவில்** பிறந்து வளர்ந்த அருண் தேஷ்பாண்டே, 1950களின் பிற்பகுதியில்
  தனது கேரம் பயணத்தைத் தொடங்கி, இந்திய கேரம் வரலாற்றில் மிகவும் அலங்கரிக்கப்பட்ட வீரர்களில்
  ஒருவராக உயர்ந்தார்.

  அவர் 1969 ஆம் ஆண்டு மகாராஷ்டிராவைப் பிரதிநிதித்துவப்படுத்தி **ஆண்கள் தேசிய ஒற்றையர்
  சாம்பியன்ஷிப்** வென்றார், பின்னர் 1972 சீனியர் நேஷனல்ஸில் கலப்பு இரட்டையர். 1981
  இல், அவர் தேசிய மூத்த பட்டத்திற்கும் தலைமை தாங்கினார் - பல தசாப்தங்களாக தனது தேர்ச்சியை
  நிரூபித்தார்.

  இந்திய தேசிய அணியின் பயிற்சியாளராக, அருண் இந்தியாவை **1வது மற்றும் 2வது உலக கேரம்
  சாம்பியன்ஷிப் இரண்டிலும் ஆதிக்கம் செலுத்துவதற்கு** - கிடைக்கக்கூடிய ஒவ்வொரு பதக்கத்தையும்
  வென்றார். 2006 கேரம் உலகக் கோப்பைக்கும் இந்தியாவை வழிநடத்தினார்.

  **இலங்கை, மாலத்தீவு, பிரான்ஸ், ஜெர்மனி, சுவிட்சர்லாந்து, யுகே, கனடா** மற்றும் பலவற்றில்
  அவரது சர்வதேச பயிற்சி தடம் பரவியுள்ளது. பிரான்சின் நவீன பியர் டுபோயிஸ் அவரது வழிகாட்டுதலின்
  கீழ் தனது ஐரோப்பிய சாம்பியன்ஷிப்பை வென்றார். அவர் **இந்திய கேரம் கூட்டமைப்பு** இன்
  வாழ்நாள் உறுப்பினர்.'
da: 'Arun Deshpande, der er født og opvokset i **Thane, Maharashtra**, begyndte sin
  karriere inden for carrom i slutningen af 1950’erne og udviklede sig til at blive
  en af de mest titelrige spillere i indisk carrom-historie.


  Han vandt **det nationale mesterskab i herresingle i 1969** som repræsentant for
  Maharashtra, og senere mixed double ved de nationale seniormesterskaber i 1972.
  I 1981 vandt han også det nationale veteranmesterskab — hvilket beviste hans mestring
  gennem årtier.


  Som træner for det indiske landshold førte Arun Indien til at **dominere både det
  1. og 2. verdensmesterskab i carrom** – hvor de vandt alle mulige medaljer. Han
  førte også Indien til Carrom-verdensmesterskabet i 2006.


  Hans internationale trænerkarriere strækker sig over **Sri Lanka, Maldiverne, Frankrig,
  Tyskland, Schweiz, Storbritannien, Canada** og flere lande. Den moderne Pierre Dubois
  fra Frankrig vandt sit europamesterskab under hans vejledning. Han er livslangt
  medlem af **Indian Carrom Federation**.

  '
de: 'Arun Deshpande, geboren und aufgewachsen in **Thane, Maharashtra**, begann seine
  Carrom-Karriere Ende der 1950er Jahre und entwickelte sich zu einem der erfolgreichsten
  Spieler in der Geschichte des indischen Carrom.


  Er gewann **1969 die nationale Einzelmeisterschaft der Herren** als Vertreter von
  Maharashtra und später das gemischte Doppel bei den Senioren-Nationalmeisterschaften
  1972. Im Jahr 1981 sicherte er sich zudem den nationalen Veteranen-Titel – und bewies
  damit seine Meisterschaft über Jahrzehnte hinweg.


  Als Trainer der indischen Nationalmannschaft führte Arun Indien dazu, **sowohl die
  1. als auch die 2. Carrom-Weltmeisterschaft zu dominieren** – und dabei jede zu
  vergebende Medaille zu gewinnen. Außerdem führte er Indien zum Carrom-Weltcup 2006.


  Seine internationale Trainerkarriere erstreckt sich über **Sri Lanka, die Malediven,
  Frankreich, Deutschland, die Schweiz, Großbritannien, Kanada** und weitere Länder.
  Der französische Spieler Modern Pierre Dubois gewann unter seiner Anleitung die
  Europameisterschaft. Er ist lebenslanges Mitglied des **Indian Carrom Federation**.

  '
it: 'Nato e cresciuto a **Thane, nel Maharashtra**, Arun Deshpande ha iniziato la
  sua avventura nel carrom alla fine degli anni ’50, affermandosi come uno dei giocatori
  più pluripremiati nella storia del carrom indiano.


  Ha vinto il **Campionato Nazionale Maschile di Singolo nel 1969** in rappresentanza
  del Maharashtra, e successivamente il doppio misto ai Campionati Nazionali Senior
  del 1972. Nel 1981 ha inoltre conquistato il titolo nazionale veterani, dimostrando
  la sua maestria nel corso di diversi decenni.


  In qualità di allenatore della nazionale indiana, Arun ha guidato l’India a **dominare
  sia il 1° che il 2° Campionato mondiale di carrom**, aggiudicandosi tutte le medaglie
  in palio. Ha inoltre guidato l’India alla Coppa del Mondo di carrom del 2006.


  La sua esperienza di allenatore a livello internazionale spazia tra **Sri Lanka,
  Maldive, Francia, Germania, Svizzera, Regno Unito, Canada** e altri paesi. Il francese
  Modern Pierre Dubois ha vinto il suo Campionato Europeo sotto la sua guida. È membro
  a vita della **Federazione Indiana di Carrom**.

  '
fr: 'Né et ayant grandi à **Thane, dans l''État du Maharashtra**, Arun Deshpande a
  fait ses débuts dans le carrom à la fin des années 1950, avant de devenir l''un
  des joueurs les plus titrés de l''histoire du carrom indien.


  Il a remporté le **championnat national masculin en simple en 1969** sous les couleurs
  du Maharashtra, puis le double mixte lors des championnats nationaux seniors de
  1972. En 1981, il a également décroché le titre national chez les vétérans, prouvant
  ainsi sa maîtrise sur plusieurs décennies.


  En tant qu’entraîneur de l’équipe nationale indienne, Arun a mené l’Inde à **dominer
  à la fois le 1er et le 2e Championnat du monde de carrom** — remportant toutes les
  médailles en jeu. Il a également guidé l’Inde vers la Coupe du monde de carrom 2006.


  Son parcours d’entraîneur à l’international s’étend au **Sri Lanka, aux Maldives,
  en France, en Allemagne, en Suisse, au Royaume-Uni, au Canada** et bien d’autres
  pays encore. Le Français Modern Pierre Dubois a remporté son titre de champion d’Europe
  sous sa houlette. Il est membre à vie de la **Fédération indienne de carrom**.

  '
or: 'ମହାରାଷ୍ଟ୍ର **ଥାନେ** ରେ ଜନ୍ମଗ୍ରହଣ କରି ଅରୁଣ ଦେଶପାଣ୍ଡେ ୧ 5050 ୦ ଦଶକର ଶେଷ ଭାଗରେ ନିଜର
  କାରୋମ ଯାତ୍ରା ଆରମ୍ଭ କରି ଭାରତୀୟ କାରୋମ ଇତିହାସର ଅନ୍ୟତମ ସଜ୍ଜିତ ଖେଳାଳି ଭାବରେ ପରିଣତ ହୋଇଥିଲେ।

  ସେ 1969 ମସିହାରେ ତାଙ୍କର **ପୁରୁଷ ଜାତୀୟ ଏକକ ଚାମ୍ପିଅନସିପ୍** ରେ ମହାରାଷ୍ଟ୍ରର ପ୍ରତିନିଧିତ୍ୱ
  କରିଥିଲେ ଏବଂ ପରେ 1972 ସିନିୟର ନ୍ୟାସନାଲରେ ମିକ୍ସଡ୍ ଡବଲ୍ସ ଜିତିଥିଲେ। 1981 ମସିହାରେ, ସେ
  ଜାତୀୟ ଭେଟେରାନ୍ ଟାଇଟଲ୍ ମଧ୍ୟ ପରିଚାଳନା କରିଥିଲେ - ଦଶନ୍ଧି ମଧ୍ୟରେ ତାଙ୍କର ଦକ୍ଷତା ପ୍ରମାଣ
  କରିଥିଲେ।

  ଭାରତୀୟ ଜାତୀୟ ଦଳର ପ୍ରଶିକ୍ଷକ ଭାବରେ ଅରୁଣ ଭାରତକୁ **ଉଭୟ ପ୍ରଥମ ଏବଂ ଦ୍ୱିତୀୟ ବିଶ୍ୱ କାରୋମ୍
  ଚାମ୍ପିଅନସିପ୍** ଉପରେ ପ୍ରାଧାନ୍ୟ ବିସ୍ତାର କରିଥିଲେ - ପ୍ରତ୍ୟେକ ଉପଲବ୍ଧ ପଦକ ଜିତିଥିଲେ। ସେ
  2006 ମସିହାରେ କାରୋମ୍ ବିଶ୍ୱକପ୍ ପାଇଁ ଭାରତକୁ ମାର୍ଗଦର୍ଶନ କରିଥିଲେ।

  ତାଙ୍କର ଆନ୍ତର୍ଜାତୀୟ କୋଚିଂ ପାଦଚିହ୍ନ **ଶ୍ରୀଲଙ୍କା, ମାଲଦ୍ୱୀପ, ଫ୍ରାନ୍ସ, ଜର୍ମାନୀ, ସ୍ୱିଜରଲ୍ୟାଣ୍ଡ,
  ବ୍ରିଟେନ, କାନାଡା** ଏବଂ ଅଧିକ। ଫ୍ରାନ୍ସର ଆଧୁନିକ ପିଆର ଡୁବାଏସ୍ ତାଙ୍କ ନିର୍ଦ୍ଦେଶନାରେ ୟୁରୋପୀୟ
  ଚାମ୍ପିଅନସିପ୍ ଜିତିଥିଲେ। ସେ **ଇଣ୍ଡିଆନ୍ କାରୋମ୍ ଫେଡେରେସନ୍** ର ଜଣେ ଜୀବନ ସଦସ୍ୟ।'
pl: 'Arun Deshpande, który urodził się i wychował w **Thane w stanie Maharashtra**,
  rozpoczął swoją przygodę z karambolem pod koniec lat 50., stając się jednym z najbardziej
  utytułowanych graczy w historii indyjskiego karambolu.


  W 1969 roku zdobył **tytuł mistrza kraju w grze pojedynczej mężczyzn**, reprezentując
  stan Maharasztra, a później zwyciężył w grze mieszanej deblowej podczas krajowych
  mistrzostw seniorów w 1972 roku. W 1981 roku zdobył również tytuł mistrza kraju
  weteranów — potwierdzając swoją mistrzowską formę na przestrzeni dziesięcioleci.


  Jako trener reprezentacji Indii Arun poprowadził drużynę do **dominacji zarówno
  na 1. jak i 2. Mistrzostwach Świata w Carromie** — zdobywając wszystkie dostępne
  medale. Poprowadził również Indie do Pucharu Świata w Carromie w 2006 roku.


  Jego międzynarodowa działalność trenerska obejmuje **Sri Lankę, Malediwy, Francję,
  Niemcy, Szwajcarię, Wielką Brytanię, Kanadę** i inne kraje. Współczesny Pierre Dubois
  z Francji zdobył tytuł mistrza Europy pod jego kierownictwem. Jest dożywotnim członkiem
  **Indyjskiej Federacji Karomu**.

  '
