{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</header>

{{ .Content }}

{{ with .Pages }}
<div class="chapter-grid">
  {{ range . }}
    <a class="chapter-card" href="{{ .RelPermalink }}">
      <h3>{{ .Title }}</h3>
      <p>{{ .Description }}</p>
    </a>
  {{ end }}
</div>
{{ end }}
{{ end }}
