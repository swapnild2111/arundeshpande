<div class="theme-switcher">
  <button
    type="button"
    class="theme-switcher-toggle"
    data-theme-toggle
    data-aria-light="{{ i18n "theme_switch_light" | default "Switch to light mode" }}"
    data-aria-dark="{{ i18n "theme_switch_dark" | default "Switch to dark mode" }}"
    aria-label="{{ i18n "theme_switch_light" | default "Switch to light mode" }}"
  >
    <span class="theme-switcher-icon theme-switcher-icon--to-light" aria-hidden="true">{{ partial "icons/sun.html" . }}</span>
    <span class="theme-switcher-icon theme-switcher-icon--to-dark" aria-hidden="true">{{ partial "icons/moon.html" . }}</span>
    <span class="theme-switcher-label theme-switcher-label--to-light">{{ i18n "theme_light" | default "Light" }}</span>
    <span class="theme-switcher-label theme-switcher-label--to-dark">{{ i18n "theme_dark" | default "Dark" }}</span>
  </button>
</div>
