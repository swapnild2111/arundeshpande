{{ $section := .Site.GetPage "section" "book" }}
{{ if $section }}
<nav class="chapter-nav">
  {{ with .PrevInSection }}
    <a class="prev" href="{{ .Permalink }}">← {{ .Title }}</a>
  {{ end }}
  {{ with .NextInSection }}
    <a class="next" href="{{ .Permalink }}">{{ .Title }} →</a>
  {{ end }}
</nav>
{{ end }}
