{{ define "main" }}
<div class="book-index">
  <header class="page-header">
    <h1><span class="icon-pill">{{ partial "icons/book.html" . }}</span>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
  </header>

  {{ .Content }}

  <div class="chapter-grid">
    {{ range .Pages.ByWeight }}
      <a class="chapter-card" href="{{ .RelPermalink }}">
        <span class="number">{{ i18n "chapter" | default "Chapter" }} {{ .Params.weight }}</span>
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
