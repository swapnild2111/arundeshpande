baseURL = "https://swapnild2111.github.io/arundeshpande/"
title = "Carrom Coach Arun Deshpande"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[languages]

  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
    contentDir = "content/en"
    [languages.en.params]
      description = "Free carrom coaching by Arun Deshpande — 7× Maharashtra Champion, India National Team coach. Full book, 60+ tutorial videos & PDF downloads in 12 languages."

  [languages.da]
    label = "Dansk"
    locale = "da"
    weight = 2
    contentDir = "content/da"
    [languages.da.params]
      description = "Carrom-coaching, teknik og bog af Arun Deshpande"

  [languages.de]
    label = "Deutsch"
    locale = "de"
    weight = 3
    contentDir = "content/de"
    [languages.de.params]
      description = "Carrom Coaching, Technik und Buch von Arun Deshpande"

