[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
