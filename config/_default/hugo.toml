baseURL = "https://swapnild2111.github.io/arundeshpande/"
title = "Carrom Coach Arun Deshpande"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
enableGitInfo = false
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[languages]

  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
    contentDir = "content/en"
    [languages.en.params]
      description = "Carrom coaching, technique and book by Arun Deshpande"

  [languages.da]
    label = "Dansk"
    locale = "da"
    weight = 2
    contentDir = "content/da"
    [languages.da.params]
      description = "Carrom-coaching, teknik og bog af Arun Deshpande"

  [languages.de]
    label = "Deutsch"
    locale = "de"
    weight = 3
    contentDir = "content/de"
    [languages.de.params]
      description = "Carrom Coaching, Technik und Buch von Arun Deshpande"

  [languages.mr]
    label = "मराठी"
    locale = "mr"
    weight = 4
    contentDir = "content/mr"
    [languages.mr.params]
      description = "अरुण देशपांडे यांचे कॅरम प्रशिक्षण, तंत्र आणि पुस्तक"

  [languages.it]
    label = "Italiano"
    locale = "it"
    weight = 5
    contentDir = "content/it"
    [languages.it.params]
      description = "Coaching, tecnica e libro di carrom di Arun Deshpande"

  [languages.fr]
    label = "Français"
    locale = "fr"
    weight = 6
    contentDir = "content/fr"
    [languages.fr.params]
      description = "Coaching, technique et livre de carrom par Arun Deshpande"

  [languages.si]
    label = "සිංහල"
    locale = "si"
    weight = 7
    contentDir = "content/si"
    [languages.si.params]
      description = "Arun Deshpande විසින් Carrom පුහුණුව, තාක්ෂණය සහ පොත"

  [languages.hi]
    label = "हिन्दी"
    locale = "hi"
    weight = 8
    contentDir = "content/hi"
    [languages.hi.params]
      description = "अरुण देशपांडे द्वारा कैरम कोचिंग, तकनीक और पुस्तक"

  [languages.gu]
    label = "ગુજરાતી"
    locale = "gu"
    weight = 9
    contentDir = "content/gu"
    [languages.gu.params]
      description = "અરુણ દેશપાંડે દ્વારા કેરમ કોચિંગ, ટેકનીક અને પુસ્તક"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
