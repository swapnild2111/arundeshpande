baseURL = "https://swapnild2111.github.io/arundeshpande/"
title = "Arun Deshpande — Carrom Coach"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = false

[languages]

  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
    contentDir = "content/en"
    [languages.en.params]
      description = "Carrom coaching, technique and book by Arun Deshpande"

  [languages.da]
    label = "Dansk"
    locale = "da"
    weight = 2
    contentDir = "content/da"
    [languages.da.params]
      description = "Carrom-coaching, teknik og bog af Arun Deshpande"

  [languages.de]
    label = "Deutsch"
    locale = "de"
    weight = 3
    contentDir = "content/de"
    [languages.de.params]
      description = "Carrom Coaching, Technik und Buch von Arun Deshpande"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
